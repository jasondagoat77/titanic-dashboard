server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://titanic-backend-6woe.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header Host YOUR-BACKEND.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/ {
        proxy_pass https://titanic-backend-6woe.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header Host YOUR-BACKEND.onrender.com;
    }
}