# render.yaml — Deploy both services to Render.com
# Docs: https://render.com/docs/render-yaml-spec

services:
  # ── Flask Backend ─────────────────────────────────────────
  - type: web
    name: titanic-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: PORT
        value: "5000"
      - key: PYTHON_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true

  # ── React Frontend ────────────────────────────────────────
  - type: web
    name: titanic-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        value: "https://titanic-backend.onrender.com"
    autoDeploy: true