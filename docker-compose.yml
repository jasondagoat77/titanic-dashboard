version: '3.9'

services:
  backend:
    build: ./backend
    container_name: titanic-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    volumes:
      - ./backend/static/charts:/app/static/charts
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=
    container_name: titanic-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: titanic-net