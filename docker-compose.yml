version: '3.9'

services:
  backend:
    build: ./backend
    container_name: titanic-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    volumes:
      - ./backend/static/charts:/app/static/charts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=  # empty = use nginx proxy
    container_name: titanic-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: titanic-net
